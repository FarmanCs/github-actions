name: Deployment to DockerHub

on:
  push:
    branches: ["main"]

jobs:
  deployment-build-docker-img-via-github-actions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t farmankhan99/devops:latest .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Image
        run: docker push farmankhan99/devops:latest
